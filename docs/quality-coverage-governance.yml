{
  "schema_version": "quality_coverage_governance.v1",
  "debt_budget": {
    "broad_exclude_register_max": 7,
    "per_file_ignore_register_max": 3,
    "policy": "ratchet_only; lower these maxima after cleanup, do not raise them without explicit release review"
  },
  "repos": [
    {
      "repo": "cross-sectional-trees",
      "ruff": {
        "staged_select": ["E", "F", "I", "UP", "B", "C4", "RET", "SIM", "RUF", "C90"],
        "current_hard_gate": "scripts/dev/run_tests.sh lint",
        "staged_check": "ruff check --select E,F,I,UP,B,C4,RET,SIM,RUF,C90 src/cstree/pipeline/contracts.py src/cstree/pipeline/output_context.py src/cstree/pipeline/output_artifacts.py src/cstree/pipeline/output.py src/cstree/pipeline/output_orchestration.py src/cstree/pipeline/output_summary.py src/cstree/pipeline/final_oos_stage.py src/cstree/liveops/export_targets.py src/cstree/liveops/alloc_core.py src/cstree/liveops/alloc_selection.py src/cstree/backtesting/types.py",
        "promotion_criteria": "focused Ruff passes on covered modules and remaining exceptions are registered"
      },
      "pyright": {
        "current_mode": "basic",
        "next_include_targets": [
          "src/cstree/pipeline/contracts.py",
          "src/cstree/pipeline/output_context.py",
          "src/cstree/pipeline/output_artifacts.py",
          "src/cstree/pipeline/output.py",
          "src/cstree/pipeline/output_orchestration.py",
          "src/cstree/pipeline/output_summary.py",
          "src/cstree/pipeline/final_oos_stage.py",
          "src/cstree/liveops/export_targets.py",
          "src/cstree/liveops/alloc_core.py",
          "src/cstree/liveops/alloc_selection.py",
          "src/cstree/liveops/alloc.py",
          "src/cstree/backtesting/types.py"
        ],
        "promotion_criteria": "contract/liveops modules pass before broader research modules are added"
      }
    },
    {
      "repo": "market-data-platform",
      "ruff": {
        "staged_select": ["E", "F", "I", "UP", "B", "C4", "RET", "RUF100"],
        "current_hard_gate": "uv run python -m ruff check .",
        "first_include_targets": [
          "src/market_data_platform/hk_assets/__init__.py",
          "src/market_data_platform/hk_assets/_public_exports.py",
          "src/market_data_platform/hk_assets/models.py",
          "src/market_data_platform/hk_assets/shared.py",
          "src/market_data_platform/hk_assets/quality_gate.py",
          "src/market_data_platform/hk_assets/coverage_rendering.py",
          "src/market_data_platform/hk_assets/asset_io.py",
          "src/market_data_platform/hk_assets/manifest_ops.py",
          "src/market_data_platform/hk_assets/public_api.py",
          "src/market_data_platform/hk_assets/rebase_metadata.py",
          "src/market_data_platform/hk_assets/build_paths.py",
          "src/market_data_platform/hk_assets/fetch_runtime.py",
          "src/market_data_platform/hk_assets/request_groups.py",
          "src/market_data_platform/hk_assets/args_shared.py",
          "src/market_data_platform/hk_assets/health_shared.py"
        ],
        "promotion_criteria": "low-risk HK modules pass before heavy workflow modules are removed from excludes"
      },
      "pyright": {
        "current_mode": "basic",
        "next_include_targets": [
          "src/market_data_platform/hk_assets/models.py",
          "src/market_data_platform/hk_assets/shared.py",
          "src/market_data_platform/hk_assets/quality_gate.py",
          "src/market_data_platform/hk_assets/coverage_rendering.py",
          "src/market_data_platform/hk_assets/asset_io.py",
          "src/market_data_platform/hk_assets/manifest_ops.py",
          "src/market_data_platform/hk_assets/public_api.py",
          "src/market_data_platform/hk_assets/rebase_metadata.py",
          "src/market_data_platform/hk_assets/build_paths.py",
          "src/market_data_platform/hk_assets/fetch_runtime.py",
          "src/market_data_platform/hk_assets/request_groups.py",
          "src/market_data_platform/hk_assets/args_shared.py",
          "src/market_data_platform/hk_assets/health_shared.py",
          "src/market_data_platform/hk_depth/storage.py",
          "src/market_data_platform/hk_depth/symbols.py"
        ],
        "promotion_criteria": "schema/shared and low-risk HK depth modules pass before workflow and remaining downloader modules are added"
      }
    },
    {
      "repo": "quant-execution-engine",
      "ruff": {
        "staged_select": ["E", "F", "I", "UP", "B"],
        "current_hard_gate": "uv run python -m ruff check .",
        "promotion_criteria": "existing hard gate stays green"
      },
      "pyright": {
        "current_mode": "basic",
        "strict_targets": [
          "src/quant_execution_engine/targets.py",
          "src/quant_execution_engine/risk.py",
          "src/quant_execution_engine/preflight.py",
          "src/quant_execution_engine/rebalance.py",
          "src/quant_execution_engine/execution_state.py",
          "src/quant_execution_engine/broker/base.py",
          "src/quant_execution_engine/execution_service.py",
          "src/quant_execution_engine/cli.py"
        ],
        "promotion_criteria": "execution-critical modules pass stricter checks before optional broker adapters are tightened"
      }
    }
  ],
  "broad_exclude_register": [
    {
      "repo": "market-data-platform",
      "path": "src/market_data_platform/hk_assets heavy modules",
      "tool": "ruff",
      "owner": "market-data-platform",
      "reason": "large restore-sensitive HK asset modules still require staged lint cleanup after low-risk support modules entered Ruff coverage",
      "next_include_target": "hk_assets/args.py and hk_assets/args_mirror.py",
      "review_milestone": "next quality-baseline refresh",
      "coverage_patterns": ["src/market_data_platform/hk_assets"]
    },
    {
      "repo": "market-data-platform",
      "path": "src/market_data_platform/hk_assets heavy modules",
      "tool": "pyright",
      "owner": "market-data-platform",
      "reason": "workflow modules still need pandas typing and import-boundary cleanup after low-risk support modules entered Pyright coverage",
      "next_include_target": "hk_assets/args.py and hk_assets/args_mirror.py",
      "review_milestone": "next quality-baseline refresh",
      "coverage_patterns": ["src/market_data_platform/hk_assets"]
    },
    {
      "repo": "market-data-platform",
      "path": "src/market_data_platform/release_tools",
      "tool": "pyright",
      "owner": "market-data-platform",
      "reason": "release workflow modules are large orchestration code and need model/path extraction first",
      "next_include_target": "release_tools/hk_asset_workflow_state.py and hk_asset_workflow_paths.py",
      "review_milestone": "after workflow state/path extraction",
      "coverage_patterns": ["src/market_data_platform/release_tools"]
    },
    {
      "repo": "market-data-platform",
      "path": "src/market_data_platform/hk_depth/*",
      "tool": "pyright",
      "owner": "market-data-platform",
      "reason": "HK depth modules are restore-sensitive and require staged schema/quota/client typing",
      "next_include_target": "hk_depth/schema.py, quota.py, rq_client.py, download_state.py",
      "review_milestone": "after storage/symbols stay green",
      "coverage_patterns": ["src/market_data_platform/hk_depth"]
    },
    {
      "repo": "market-data-platform",
      "path": "src/market_data_platform provider and runtime compatibility modules",
      "tool": "pyright",
      "owner": "market-data-platform",
      "reason": "provider/runtime compatibility modules still need interface narrowing before Pyright coverage expands",
      "next_include_target": "data_providers.py and rqdata_runtime.py",
      "review_milestone": "after provider adapter contract tests are refreshed",
      "coverage_patterns": [
        "src/market_data_platform/data_providers.py",
        "src/market_data_platform/data_warehouse.py",
        "src/market_data_platform/rqdata_runtime.py"
      ]
    },
    {
      "repo": "cross-sectional-trees",
      "path": "configs/local",
      "tool": "ruff",
      "owner": "cross-sectional-trees",
      "reason": "local override configs are personal and not active package code",
      "next_include_target": "not_applicable",
      "review_milestone": "keep excluded by policy",
      "coverage_patterns": ["configs/local"]
    },
    {
      "repo": "cross-sectional-trees",
      "path": "configs/local",
      "tool": "pyright",
      "owner": "cross-sectional-trees",
      "reason": "local override configs are personal and not active package code",
      "next_include_target": "not_applicable",
      "review_milestone": "keep excluded by policy",
      "coverage_patterns": ["configs/local"]
    }
  ],
  "per_file_ignore_register": [
    {
      "repo": "cross-sectional-trees",
      "path": "src/cstree/commands/linear_sweep.py",
      "tool": "ruff",
      "rules": ["C901"],
      "owner": "cross-sectional-trees",
      "reason": "linear sweep command still mixes parser, run orchestration, and reporting",
      "next_action": "split parser and runner when sweep command changes resume",
      "review_milestone": "after command orchestration extraction"
    },
    {
      "repo": "cross-sectional-trees",
      "path": "src/cstree/commands/run_grid.py",
      "tool": "ruff",
      "rules": ["C901"],
      "owner": "cross-sectional-trees",
      "reason": "grid command still mixes parser, execution routing, and summary writing",
      "next_action": "split parser, fixed-signal runner, and summary writer when grid command changes resume",
      "review_milestone": "after command orchestration extraction"
    },
    {
      "repo": "cross-sectional-trees",
      "path": "src/cstree/commands/tune.py",
      "tool": "ruff",
      "rules": ["C901"],
      "owner": "cross-sectional-trees",
      "reason": "tune command remains a large CLI orchestration surface",
      "next_action": "split command parser, runner, and report helpers",
      "review_milestone": "after tune command refactor"
    }
  ]
}
