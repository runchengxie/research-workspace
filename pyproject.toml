[tool.ruff]
target-version = "py311"
line-length = 100
include = ["scripts/**/*.py", "tests/**/*.py"]
extend-exclude = [
  ".git",
  ".pytest_cache",
  ".venv",
  "alpha-research",
  "strategy-pipeline",
  "market-data-platform",
  "portfolio-backtester",
  "quant-execution-engine",
  "demo",
  "scripts/concept_etf_ml_backtest.py",
  "scripts/export_holdings_html.py",
  "scripts/hotsector_to_cstree_universe.py",
  "scripts/path_b_production.py",
  "scripts/path_c_m1_validate.py",
  "scripts/publish_etf_industry_signal.py",
  "scripts/style_factor_attribution.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
