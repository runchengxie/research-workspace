[tool.ruff]
target-version = "py311"
line-length = 100
include = ["scripts/**/*.py", "tests/**/*.py"]
extend-exclude = [
  ".git",
  ".pytest_cache",
  ".venv",
  "alpha-research",
  "cross-sectional-trees",
  "market-data-platform",
  "portfolio-backtester",
  "quant-execution-engine",
  "demo",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
