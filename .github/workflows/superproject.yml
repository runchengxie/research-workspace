name: superproject

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HAS_WORKSPACE_SUBMODULE_TOKEN: ${{ secrets.WORKSPACE_SUBMODULE_READ_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
      - name: Checkout private submodules
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN == 'true'
        env:
          WORKSPACE_SUBMODULE_READ_TOKEN: ${{ secrets.WORKSPACE_SUBMODULE_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${WORKSPACE_SUBMODULE_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1
      - name: Run superproject hard quality profile
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN == 'true'
        run: python scripts/run_quality_checks.py --profile hard
      - name: Run superproject smoke quality profile without private submodules
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN != 'true'
        run: python scripts/run_quality_checks.py --profile ci-smoke
      - name: Run superproject BasedPyright advisory
        continue-on-error: true
        run: python scripts/run_quality_checks.py --profile basedpyright
      - name: Run superproject tests
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN == 'true'
        run: uv run --with pytest python -m pytest tests -q
      - name: Run superproject smoke tests without private submodules
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN != 'true'
        run: >
          uv run --with pytest python -m pytest
          tests/test_root_quality.py
          tests/test_run_submodule_checks.py
          tests/test_scan_workspace_secrets.py
          -q
      - name: Verify delegated submodule check plan
        run: python scripts/run_submodule_checks.py --profile full --dry-run
      - name: Run contract smoke without local CLI requirements
        if: env.HAS_WORKSPACE_SUBMODULE_TOKEN == 'true'
        run: python src/research_contracts/smoke_contracts.py --timeout 10
