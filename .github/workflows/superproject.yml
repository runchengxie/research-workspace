name: superproject

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run superproject hard quality profile
        run: python scripts/run_quality_checks.py --profile hard
      - name: Run superproject tests
        run: uv run --with pytest python -m pytest tests -q
      - name: Verify delegated submodule check plan
        run: python scripts/run_submodule_checks.py --profile full --dry-run
      - name: Run contract smoke without local CLI requirements
        run: python src/research_contracts/smoke_contracts.py --timeout 10
